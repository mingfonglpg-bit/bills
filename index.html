<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>帳單管理系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f7f6; padding-top: 50px; }
    .container { max-width: 800px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .hidden { display: none !important; }
    .status-paid { color: green; font-weight: bold; }
    .status-unpaid { color: red; font-weight: bold; }
  </style>
</head>
<body>

<div class="container" id="login-box">
  <h2 class="text-center mb-4">系統登入</h2>
  <div class="mb-3">
    <input type="text" id="user" class="form-control" placeholder="帳號">
  </div>
  <div class="mb-3">
    <input type="password" id="pass" class="form-control" placeholder="密碼">
  </div>
  <button onclick="handleLogin()" id="loginBtn" class="btn btn-primary w-100">登入</button>
</div>

<div class="container hidden" id="main-content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>我的帳單管理</h2>
    <div>
      <button onclick="showSettings()" class="btn btn-outline-secondary btn-sm">設定密碼</button>
      <button onclick="location.reload()" class="btn btn-light btn-sm">登出</button>
    </div>
  </div>
  <table class="table table-hover">
    <thead class="table-light">
      <tr>
        <th>日期</th><th>項目</th><th>金額</th><th>狀態</th>
      </tr>
    </thead>
    <tbody id="bill-list"></tbody>
  </table>
</div>

<div class="modal fade" id="settingsModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5>修改密碼</h5></div>
      <div class="modal-body">
        <input type="password" id="new-pass" class="form-control" placeholder="輸入新密碼">
      </div>
      <div class="modal-footer">
        <button onclick="handleUpdatePassword()" class="btn btn-success">儲存</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // 重要：請替換為您的 GAS 佈署網址
  const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzzyt2N7zxHqsJLBkRhN2ced4_ycS3zeZL6DuP9isTgWzKRQbkdk7xy-qs7ErTq_Aw/exec";
  let currentUser = "";

  async function apiCall(data) {
    const response = await fetch(GAS_WEB_APP_URL, {
      method: 'POST',
      body: JSON.stringify(data)
    });
    return await response.json();
  }

  async function handleLogin() {
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;
    const btn = document.getElementById('loginBtn');
    
    btn.disabled = true;
    const res = await apiCall({ action: 'login', username: u, password: p });
    
    if (res.success) {
      currentUser = res.username;
      document.getElementById('login-box').classList.add('hidden');
      document.getElementById('main-content').classList.remove('hidden');
      loadBills();
    } else {
      alert(res.message);
      btn.disabled = false;
    }
  }

  async function loadBills() {
    const res = await apiCall({ action: 'getBills' });
    if (res.success) {
      const tbody = document.getElementById('bill-list');
      tbody.innerHTML = "";
      res.data.forEach(row => {
        const tr = document.createElement('tr');
        const statusClass = row[3] === "已繳費" ? "status-paid" : "status-unpaid";
        tr.innerHTML = `<td>${row[0]}</td><td>${row[1]}</td><td>$${row[2]}</td><td class="${statusClass}">${row[3]}</td>`;
        tbody.appendChild(tr);
      });
    }
  }

  function showSettings() {
    new bootstrap.Modal(document.getElementById('settingsModal')).show();
  }

  async function handleUpdatePassword() {
    const newP = document.getElementById('new-pass').value;
    const res = await apiCall({ action: 'updatePassword', username: currentUser, newPassword: newP });
    if (res.success) {
      alert(res.message);
      location.reload();
    }
  }
</script>
</body>
</html>
