<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>帳單管理系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f7f6; padding-top: 50px; }
    .container { max-width: 900px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .hidden { display: none !important; }
    .status-paid { color: #28a745; font-weight: bold; }
    .status-unpaid { color: #dc3545; font-weight: bold; }
    .img-link { text-decoration: none; font-size: 0.9rem; }
  </style>
</head>
<body>

<div class="container" id="login-box" style="max-width: 400px;">
  <h3 class="text-center mb-4">系統登入</h3>
  <div class="mb-3"><input type="text" id="user" class="form-control" placeholder="帳號"></div>
  <div class="mb-3"><input type="password" id="pass" class="form-control" placeholder="密碼"></div>
  <button onclick="handleLogin()" id="loginBtn" class="btn btn-primary w-100">登入</button>
</div>

<div id="main-content" class="container hidden">
  <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
    <h3>帳單管理清單</h3>
    <div>
      <span id="user-info" class="me-3 text-muted"></span>
      <button class="btn btn-sm btn-success" onclick="openBillModal()">+ 新增帳單</button>
      <button class="btn btn-sm btn-outline-danger" onclick="location.reload()">登出</button>
    </div>
  </div>
  
  <div class="table-responsive">
    <table class="table table-hover align-middle">
      <thead class="table-light">
        <tr>
          <th>日期</th><th>項目</th><th>金額</th><th>狀態</th><th>照片</th><th>操作</th>
        </tr>
      </thead>
      <tbody id="bill-list"></tbody>
    </table>
  </div>
</div>

<div class="modal fade" id="billModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 id="modalTitle">帳單詳情</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <input type="hidden" id="edit-id"><input type="hidden" id="edit-imgId">
        <div class="mb-3"><label class="form-label">日期</label><input type="date" id="edit-date" class="form-control"></div>
        <div class="mb-3"><label class="form-label">項目</label><input type="text" id="edit-item" class="form-control"></div>
        <div class="mb-3"><label class="form-label">金額</label><input type="number" id="edit-amount" class="form-control"></div>
        <div class="mb-3"><label class="form-label">狀態</label>
          <select id="edit-status" class="form-control">
            <option value="未繳費">未繳費</option><option value="已繳費">已繳費</option>
          </select>
        </div>
        <div class="mb-3"><label class="form-label">附件照片</label><input type="file" id="edit-file" class="form-control" accept="image/*"></div>
      </div>
      <div class="modal-footer"><button id="saveBtn" onclick="handleSaveBill()" class="btn btn-primary w-100">儲存資料</button></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzzyt2N7zxHqsJLBkRhN2ced4_ycS3zeZL6DuP9isTgWzKRQbkdk7xy-qs7ErTq_Aw/exec"; 
  let billModal;
  let currentUser = "";

  window.onload = () => { billModal = new bootstrap.Modal(document.getElementById('billModal')); };

  async function apiCall(data) {
    const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });
    return await response.json();
  }

  async function handleLogin() {
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    const res = await apiCall({ action: 'login', username: u, password: p });
    if (res.success) {
      currentUser = res.username;
      document.getElementById('user-info').innerText = "Hi, " + currentUser;
      document.getElementById('login-box').classList.add('hidden');
      document.getElementById('main-content').classList.remove('hidden');
      loadBills();
    } else { alert(res.message); btn.disabled = false; }
  }

  async function loadBills() {
    const res = await apiCall({ action: 'getBills' });
    const tbody = document.getElementById('bill-list');
    tbody.innerHTML = "";
    res.data.forEach(row => {
      const tr = document.createElement('tr');
      const statusClass = row[4] === "已繳費" ? "status-paid" : "status-unpaid";
      const imgHtml = row[5] ? `<a href="https://drive.google.com/uc?id=${row[5]}" target="_blank" class="img-link">📎 查看照片</a>` : '<span class="text-muted">無</span>';
      tr.innerHTML = `<td>${row[1]}</td><td>${row[2]}</td><td>$${row[3]}</td><td class="${statusClass}">${row[4]}</td><td>${imgHtml}</td>
        <td><button class="btn btn-sm btn-outline-info me-1" onclick='editBill(${JSON.stringify(row)})'>編輯</button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteBill('${row[0]}')">刪除</button></td>`;
      tbody.appendChild(tr);
    });
  }

  function openBillModal() {
    document.getElementById('edit-id').value = "";
    document.getElementById('edit-imgId').value = "";
    document.getElementById('edit-date').value = "";
    document.getElementById('edit-item').value = "";
    document.getElementById('edit-amount').value = "";
    document.getElementById('edit-file').value = "";
    document.getElementById('modalTitle').innerText = "新增帳單紀錄";
    billModal.show();
  }

  async function handleSaveBill() {
    const btn = document.getElementById('saveBtn');
    const fileInput = document.getElementById('edit-file');
    btn.disabled = true;
    let imageData = null;

    if (fileInput.files.length > 0) {
      const file = fileInput.files[0];
      const base64 = await new Promise(r => { 
        const reader = new FileReader(); 
        reader.onload = () => r(reader.result); 
        reader.readAsDataURL(file); 
      });
      imageData = { base64: base64.split(',')[1], type: file.type, name: file.name };
    }

    const billData = {
      id: document.getElementById('edit-id').value,
      date: document.getElementById('edit-date').value,
      item: document.getElementById('edit-item').value,
      amount: document.getElementById('edit-amount').value,
      status: document.getElementById('edit-status').value,
      imgId: document.getElementById('edit-imgId').value
    };

    const res = await apiCall({ action: 'saveBill', billData, imageFile: imageData });
    if(res.success) { billModal.hide(); loadBills(); }
    btn.disabled = false;
  }

  async function deleteBill(id) { if (confirm("確定刪除此紀錄？")) { await apiCall({ action: 'deleteBill', id }); loadBills(); } }

  function editBill(row) {
    document.getElementById('edit-id').value = row[0];
    document.getElementById('edit-date').value = row[1];
    document.getElementById('edit-item').value = row[2];
    document.getElementById('edit-amount').value = row[3];
    document.getElementById('edit-status').value = row[4];
    document.getElementById('edit-imgId').value = row[5];
    document.getElementById('modalTitle').innerText = "編輯帳單紀錄";
    billModal.show();
  }
</script>
</body>
</html>
