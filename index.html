<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .hidden { display: none !important; }
    .img-preview { width: 50px; cursor: pointer; }
  </style>
</head>
<body class="bg-light p-3">

<div id="main-content" class="container bg-white p-4 rounded shadow hidden">
  <div class="d-flex justify-content-between mb-3">
    <h3>帳單清單</h3>
    <button class="btn btn-success" onclick="openBillModal()">+ 新增帳單</button>
  </div>
  <table class="table align-middle">
    <thead><tr><th>日期</th><th>項目</th><th>金額</th><th>狀態</th><th>照片</th><th>操作</th></tr></thead>
    <tbody id="bill-list"></tbody>
  </table>
</div>

<div class="modal fade" id="billModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 id="modalTitle">帳單資料</h5></div>
      <div class="modal-body">
        <input type="hidden" id="edit-id">
        <input type="hidden" id="edit-imgId">
        <div class="mb-2">日期<input type="date" id="edit-date" class="form-control"></div>
        <div class="mb-2">項目<input type="text" id="edit-item" class="form-control"></div>
        <div class="mb-2">金額<input type="number" id="edit-amount" class="form-control"></div>
        <div class="mb-2">狀態
          <select id="edit-status" class="form-control">
            <option value="未繳費">未繳費</option><option value="已繳費">已繳費</option>
          </select>
        </div>
        <div class="mb-2">上傳照片<input type="file" id="edit-file" class="form-control" accept="image/*"></div>
      </div>
      <div class="modal-footer">
        <button onclick="handleSaveBill()" class="btn btn-primary">儲存</button>
      </div>
    </div>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzzyt2N7zxHqsJLBkRhN2ced4_ycS3zeZL6DuP9isTgWzKRQbkdk7xy-qs7ErTq_Aw/exec";
  let billModal;

  window.onload = () => { billModal = new bootstrap.Modal(document.getElementById('billModal')); };

  async function loadBills() {
    const res = await apiCall({ action: 'getBills' });
    const tbody = document.getElementById('bill-list');
    tbody.innerHTML = "";
    res.data.forEach(row => {
      const tr = document.createElement('tr');
      // row[5] 是圖片 ID，這裡簡單顯示連結
      const imgHtml = row[5] ? `<a href="https://drive.google.com/uc?id=${row[5]}" target="_blank">查看</a>` : "無";
      tr.innerHTML = `
        <td>${row[1]}</td><td>${row[2]}</td><td>${row[3]}</td><td>${row[4]}</td>
        <td>${imgHtml}</td>
        <td>
          <button class="btn btn-sm btn-info" onclick='editBill(${JSON.stringify(row)})'>編輯</button>
          <button class="btn btn-sm btn-danger" onclick="deleteBill('${row[0]}')">刪除</button>
        </td>`;
      tbody.appendChild(tr);
    });
  }

  function openBillModal() {
    document.getElementById('edit-id').value = "";
    document.getElementById('modalTitle').innerText = "新增帳單";
    billModal.show();
  }

  async function handleSaveBill() {
    const fileInput = document.getElementById('edit-file');
    let imageData = null;

    if (fileInput.files.length > 0) {
      const file = fileInput.files[0];
      const base64 = await toBase64(file);
      imageData = { base64: base64.split(',')[1], type: file.type, name: file.name };
    }

    const billData = {
      id: document.getElementById('edit-id').value,
      date: document.getElementById('edit-date').value,
      item: document.getElementById('edit-item').value,
      amount: document.getElementById('edit-amount').value,
      status: document.getElementById('edit-status').value,
      imgId: document.getElementById('edit-imgId').value
    };

    await apiCall({ action: 'saveBill', billData, imageFile: imageData });
    billModal.hide();
    loadBills();
  }

  const toBase64 = file => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });

  async function deleteBill(id) {
    if (confirm("確定刪除？")) {
      await apiCall({ action: 'deleteBill', id });
      loadBills();
    }
  }

  function editBill(row) {
    document.getElementById('edit-id').value = row[0];
    document.getElementById('edit-date').value = row[1];
    document.getElementById('edit-item').value = row[2];
    document.getElementById('edit-amount').value = row[3];
    document.getElementById('edit-status').value = row[4];
    document.getElementById('edit-imgId').value = row[5];
    document.getElementById('modalTitle').innerText = "編輯帳單";
    billModal.show();
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
