<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>帳單管理系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f7f6; padding-top: 50px; }
    .container { max-width: 900px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .hidden { display: none !important; }
    .status-paid { color: #28a745; font-weight: bold; }
    .status-unpaid { color: #dc3545; font-weight: bold; }
  </style>
</head>
<body>

<div class="container" id="login-box" style="max-width: 400px;">
  <h3 class="text-center mb-4">系統登入</h3>
  <div class="mb-3"><input type="text" id="user" class="form-control" placeholder="帳號"></div>
  <div class="mb-3"><input type="password" id="pass" class="form-control" placeholder="密碼"></div>
  <button onclick="handleLogin()" id="loginBtn" class="btn btn-primary w-100">登入</button>
</div>

<div id="main-content" class="container hidden">
  <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
    <h3>帳單管理系統</h3>
    <div>
      <span id="user-info" class="me-3 text-muted"></span>
      <button class="btn btn-sm btn-success" onclick="openBillModal()">+ 新增紀錄</button>
      <button class="btn btn-sm btn-outline-danger" onclick="location.reload()">登出</button>
    </div>
  </div>
  <table class="table table-hover align-middle">
    <thead><tr><th>日期</th><th>項目</th><th>金額</th><th>狀態</th><th>照片</th><th>操作</th></tr></thead>
    <tbody id="bill-list"></tbody>
  </table>
</div>

<div class="modal fade" id="billModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5>帳單資料</h5></div>
      <div class="modal-body">
        <input type="hidden" id="edit-id"><input type="hidden" id="edit-imgId">
        <div class="mb-3"><label>日期</label><input type="date" id="edit-date" class="form-control"></div>
        <div class="mb-3"><label>項目</label><input type="text" id="edit-item" class="form-control"></div>
        <div class="mb-3"><label>金額</label><input type="number" id="edit-amount" class="form-control"></div>
        <div class="mb-3"><label>狀態</label>
          <select id="edit-status" class="form-control">
            <option value="未繳費">未繳費</option><option value="已繳費">已繳費</option>
          </select>
        </div>
        <div class="mb-3"><label>照片</label><input type="file" id="edit-file" class="form-control" accept="image/*"></div>
      </div>
      <div class="modal-footer"><button onclick="handleSaveBill()" id="saveBtn" class="btn btn-primary w-100">儲存</button></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // 請確認此網址正確
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzzyt2N7zxHqsJLBkRhN2ced4_ycS3zeZL6DuP9isTgWzKRQbkdk7xy-qs7ErTq_Aw/exec"; 
  let billModal;

  window.onload = () => { billModal = new bootstrap.Modal(document.getElementById('billModal')); };

  async function apiCall(data) {
    const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });
    return await response.json();
  }

  async function handleLogin() {
    const res = await apiCall({ action: 'login', username: document.getElementById('user').value, password: document.getElementById('pass').value });
    if (res && res.success) {
      document.getElementById('login-box').classList.add('hidden');
      document.getElementById('main-content').classList.remove('hidden');
      loadBills();
    } else { alert("登入失敗"); }
  }

  async function loadBills() {
    const res = await apiCall({ action: 'getBills' });
    const tbody = document.getElementById('bill-list');
    tbody.innerHTML = "";
    res.data.forEach(row => {
      const tr = document.createElement('tr');
      const imgLink = row[5] ? `<a href="https://drive.google.com/uc?id=${row[5]}" target="_blank">查看</a>` : "無";
      tr.innerHTML = `<td>${row[1]}</td><td>${row[2]}</td><td>$${row[3]}</td><td>${row[4]}</td><td>${imgLink}</td>
        <td><button class="btn btn-sm btn-info" onclick='editBill(${JSON.stringify(row)})'>編輯</button></td>`;
      tbody.appendChild(tr);
    });
  }

  function openBillModal() {
    document.getElementById('edit-id').value = "";
    document.getElementById('edit-file').value = "";
    billModal.show();
  }

  async function handleSaveBill() {
    const fileInput = document.getElementById('edit-file');
    let imageData = null;
    if (fileInput.files.length > 0) {
      const file = fileInput.files[0];
      const base64 = await new Promise(r => {
        const reader = new FileReader();
        reader.onload = () => r(reader.result);
        reader.readAsDataURL(file);
      });
      imageData = { base64: base64.split(',')[1], type: file.type, name: file.name };
    }

    const billData = {
      id: document.getElementById('edit-id').value,
      date: document.getElementById('edit-date').value,
      item: document.getElementById('edit-item').value,
      amount: document.getElementById('edit-amount').value,
      status: document.getElementById('edit-status').value,
      imgId: document.getElementById('edit-imgId').value
    };

    await apiCall({ action: 'saveBill', billData, imageFile: imageData });
    billModal.hide();
    loadBills();
  }

  function editBill(row) {
    document.getElementById('edit-id').value = row[0];
    document.getElementById('edit-date').value = row[1];
    document.getElementById('edit-item').value = row[2];
    document.getElementById('edit-amount').value = row[3];
    document.getElementById('edit-status').value = row[4];
    document.getElementById('edit-imgId').value = row[5];
    billModal.show();
  }
</script>
</body>
</html>
