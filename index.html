<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>帳單管理系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f7f6; padding-top: 50px; }
    .container { max-width: 900px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // 1. 請務必確認此網址正確
  const GAS_URL = "https://script.google.com/macros/s/AKfycbzzyt2N7zxHqsJLBkRhN2ced4_ycS3zeZL6DuP9isTgWzKRQbkdk7xy-qs7ErTq_Aw/exec"; 
  let billModal;

  window.onload = () => { 
    billModal = new bootstrap.Modal(document.getElementById('billModal')); 
  };

  // 2. 強化後的 API 調用函數
  async function apiCall(data) {
    try {
      const response = await fetch(GAS_URL, {
        method: 'POST',
        mode: 'cors', // 確保跨網域開啟
        body: JSON.stringify(data)
      });
      if (!response.ok) throw new Error('網絡響應不正確');
      return await response.json();
    } catch (error) {
      console.error('API Error:', error);
      alert('連線失敗: ' + error.message);
    }
  }

  // 3. 核心：處理照片轉換與上傳
  async function handleSaveBill() {
    const btn = document.getElementById('saveBtn');
    const fileInput = document.getElementById('edit-file');
    btn.disabled = true;
    btn.innerText = "正在上傳並儲存...";

    let imageData = null;

    // 檢查是否有選取檔案
    if (fileInput.files.length > 0) {
      const file = fileInput.files[0];
      
      // 安全檢查：若檔案大於 10MB 可能會導致 GAS 失敗
      if (file.size > 10 * 1024 * 1024) {
        alert("檔案過大（超過 10MB），請縮小圖片後再上傳");
        btn.disabled = false;
        return;
      }

      try {
        const base64Content = await toBase64(file);
        imageData = {
          base64: base64Content.split(',')[1], // 只取 Base64 字串本體
          type: file.type,
          name: file.name
        };
      } catch (e) {
        alert("圖片讀取失敗");
        btn.disabled = false;
        return;
      }
    }

    const billData = {
      id: document.getElementById('edit-id').value,
      date: document.getElementById('edit-date').value,
      item: document.getElementById('edit-item').value,
      amount: document.getElementById('edit-amount').value,
      status: document.getElementById('edit-status').value,
      imgId: document.getElementById('edit-imgId').value
    };

    const res = await apiCall({ action: 'saveBill', billData, imageFile: imageData });
    
    if (res && res.success) {
      billModal.hide();
      alert("儲存成功！");
      loadBills();
    } else {
      alert("儲存失敗：" + (res ? res.message : "原因未知"));
    }
    
    btn.disabled = false;
    btn.innerText = "儲存帳單";
  }

  // 輔助：檔案轉 Base64 異步處理
  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result);
      reader.onerror = error => reject(error);
    });
  }

  // 其他 loadBills, editBill 函數請保持原樣...
</script>
</body>
</html>
